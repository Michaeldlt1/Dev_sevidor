name: Flask CI y Empaquetado

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Verificar sintaxis de app.py
      run: |
        python -m py_compile app.py

    # ---> 1. CREAR EL ARCHIVO COMPRIMIDO DEL PAQUETE <---
    - name: Crear paquete comprimido
      env:
        # Tu token de seguridad para operaciones que lo requieran
        MI_TOKEN_DE_ACCESO: ${{ secrets.MI_GITHUB_TOKEN }}
      run: |
        echo "Empaquetando la aplicación..."
        # Excluimos la carpeta oculta de git para limpiar el paquete
        zip -r mi_aplicacion_flask.zip . -x "*.git*"

    # ---> 2. GUARDAR Y PUBLICAR EL PAQUETE EN GITHUB <---
    - name: Subir paquete como artefacto de GitHub
      uses: actions/upload-artifact@v4
      with:
        name: paquete-flask-produccion   # Este será el nombre del botón de descarga
        path: mi_aplicacion_flask.zip     # Ruta del archivo generado en el paso anterior
   
